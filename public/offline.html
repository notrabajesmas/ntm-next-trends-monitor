<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión - NTM</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      margin-bottom: 24px;
    }
    
    h1 {
      color: white;
      font-size: 28px;
      margin-bottom: 12px;
    }
    
    p {
      color: #94a3b8;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    
    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      opacity: 0.6;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
    }
    
    .tips {
      margin-top: 40px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      text-align: left;
    }
    
    .tips h3 {
      color: #10b981;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    
    .tips ul {
      list-style: none;
      color: #94a3b8;
      font-size: 14px;
    }
    
    .tips li {
      padding: 8px 0;
      padding-left: 20px;
      position: relative;
    }
    
    .tips li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: #10b981;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/icon-192x192.png" alt="NTM" class="logo">
    
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="1.5">
      <path d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414"/>
    </svg>
    
    <h1>Sin conexión a internet</h1>
    
    <p>
      Parece que estás offline. Verifica tu conexión a internet e intenta de nuevo.
    </p>
    
    <button class="btn" onclick="location.reload()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      Reintentar
    </button>
    
    <div class="tips">
      <h3>Mientras tanto...</h3>
      <ul>
        <li>Tus análisis guardados están disponibles</li>
        <li>Los reportes descargados se conservan</li>
        <li>La app se sincronizará al recuperar conexión</li>
      </ul>
    </div>
  </div>
  
  <script>
    // Intentar reconectar automáticamente
    window.addEventListener('online', () => {
      location.reload();
    });
  </script>
</body>
</html>
